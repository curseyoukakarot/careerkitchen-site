
<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareerKitchen – Free Career Resources & Advice</title>

  <!-- Fonts + Tailwind + FontAwesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <style>
    * {
      font-family: "Inter", sans-serif;
    }
    ::-webkit-scrollbar {
      display: none;
    }
    .highlighted-section {
      outline: 2px solid #3F20FB;
      background-color: rgba(63, 32, 251, 0.1);
    }
    .edit-button {
      position: absolute;
      z-index: 1000;
    }
  </style>
</head>
<body class="h-full text-base-content">
  <div class="min-h-screen bg-gradient-to-b from-gray-900 via-purple-900 to-blue-900">
    <!-- Header -->
    <header id="header" class="fixed w-full z-50 bg-gray-900/95 backdrop-blur-sm border-b border-purple-500/20">
      <nav class="container mx-auto px-4 py-4">
        <div class="flex items-center justify-between">
          <div class="text-2xl font-bold text-white">CareerKitchen</div>
          <div class="hidden md:flex space-x-8">
            <a href="/" class="text-gray-300 hover:text-white">Home</a>
            <a href="/blog" class="text-white border-b-2 border-purple-500">Blog</a>
            <span class="text-gray-300 hover:text-white cursor-pointer">Podcast</span>
            <span class="text-gray-300 hover:text-white cursor-pointer">Resources</span>
            <span class="text-gray-300 hover:text-white cursor-pointer">RecruitPro</span>
          </div>
          <button class="bg-gradient-to-r from-purple-600 to-blue-600 text-white px-6 py-2 rounded-full hover:opacity-90">
            Subscribe
          </button>
        </div>
      </nav>
    </header>

    <!-- Hero Section -->
    <section id="hero" class="pt-32 pb-20">
      <div class="container mx-auto px-4">
        <div class="max-w-4xl mx-auto text-center">
          <h1 class="text-5xl md:text-7xl font-bold text-white mb-6 leading-tight">
            Get Free Weekly Career Advice
          </h1>
          <p class="text-xl text-gray-300 mb-10">
            Get advice, support, and insider tips from top mentors—join our community and level up your career journey
          </p>
          <div class="max-w-xl mx-auto">
            <div class="flex gap-4">
              <input type="email" placeholder="Enter your email" class="flex-1 px-6 py-4 rounded-full bg-gray-800 border border-purple-500/30 text-white">
              <button class="px-8 py-4 bg-gradient-to-r from-purple-600 to-blue-600 rounded-full text-white font-semibold hover:opacity-90">
                Subscribe for Free
              </button>
            </div>
          </div>
          <div class="mt-12 flex justify-center items-center gap-8">
            <i class="fa-brands fa-spotify text-3xl text-gray-400"></i>
            <i class="fa-brands fa-linkedin text-3xl text-gray-400"></i>
            <i class="fa-brands fa-medium text-3xl text-gray-400"></i>
            <i class="fa-brands fa-youtube text-3xl text-gray-400"></i>
          </div>
        </div>
      </div>
    </section>
